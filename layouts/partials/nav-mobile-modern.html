<!-- Modern Mobile Navigation -->
<div class="mobile-nav-container lg:hidden">
  <!-- Menu Toggle Button -->
  <button
    class="mobile-menu-toggle btn-reset touch-target"
    aria-label="Toggle navigation menu"
    aria-expanded="false"
    aria-controls="mobile-menu"
    data-menu-toggle
  >
    <span class="hamburger-icon" aria-hidden="true">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </span>
  </button>

  <!-- Mobile Menu Backdrop -->
  <div
    class="mobile-menu-backdrop"
    data-menu-backdrop
    aria-hidden="true"
  ></div>

  <!-- Mobile Menu Panel -->
  <nav
    class="mobile-menu"
    id="mobile-menu"
    aria-labelledby="mobile-menu-label"
    data-menu-panel
  >
    <!-- Menu Header -->
    <div class="mobile-menu-header">
      <h2 id="mobile-menu-label" class="sr-only">Navigation Menu</h2>
      <button
        class="mobile-menu-close btn-reset touch-target"
        aria-label="Close navigation menu"
        data-menu-close
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="mobile-menu-search">
      <form action="/search" method="get" role="search" class="px-4 py-3">
        <label for="mobile-search" class="sr-only">Search the site</label>
        <input
          class="w-full px-3 py-2 rounded-lg bg-white/10 border border-white/15 text-white text-sm placeholder-gray-400 focus:border-[#5D5FEF] focus:outline-none"
          id="mobile-search"
          type="search"
          name="query"
          placeholder="Search..."
          aria-label="Search"
        >
      </form>
    </div>

    <!-- Navigation Links -->
    <ul class="mobile-menu-list" role="list">
      {{ range site.Data.main.nav }}
        {{ $isActive := or (and (eq .link "/") ($.IsHome)) (and (ne .link "/") (hasPrefix ($.RelPermalink) .link)) }}
        <li class="mobile-menu-item">
          <a
            href="{{ .link }}"
            class="mobile-menu-link keyboard-focusable{{ if $isActive }} mobile-menu-link--active{{ end }}"
          >
            {{ .name }}
          </a>
        </li>
      {{ end }}
    </ul>

    <!-- Social Links -->
    <div class="mobile-menu-footer">
      <div class="mobile-social-links">
        {{ partial "social-links.html" (dict) }}
      </div>
    </div>
  </nav>
</div>
